name: dc-agent-offline

services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    restart: unless-stopped
    environment:
      POSTGRES_DB: dc_agent
      POSTGRES_USER: dc_agent
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/postgres
        target: /var/lib/postgresql/data
        bind:
          create_host_path: false
    networks:
      - offline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_agent -d dc_agent"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    image: ${CLICKHOUSE_IMAGE:?CLICKHOUSE_IMAGE is required}
    restart: unless-stopped
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_QUERY_USER: ${CLICKHOUSE_QUERY_USER:?CLICKHOUSE_QUERY_USER is required}
      CLICKHOUSE_INGEST_USER: ${CLICKHOUSE_INGEST_USER:?CLICKHOUSE_INGEST_USER is required}
    secrets:
      - clickhouse_query_password
      - clickhouse_ingest_password
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/clickhouse
        target: /var/lib/clickhouse
        bind:
          create_host_path: false
      - type: bind
        source: ./clickhouse-init.sh
        target: /docker-entrypoint-initdb.d/010-dcagent-structured-users.sh
        read_only: true
        bind:
          create_host_path: false
    networks:
      - offline
    mem_limit: ${CLICKHOUSE_MEMORY_LIMIT:?CLICKHOUSE_MEMORY_LIMIT is required}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: ${QDRANT_IMAGE:?QDRANT_IMAGE is required}
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/qdrant
        target: /qdrant/storage
        bind:
          create_host_path: false
    networks:
      - offline
    mem_limit: ${QDRANT_MEMORY_LIMIT:?QDRANT_MEMORY_LIMIT is required}
    healthcheck:
      test: ["CMD", "bash", "-ec", ": >/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE:?REDIS_IMAGE is required}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/redis
        target: /data
        bind:
          create_host_path: false
    networks:
      - offline
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  clamav:
    image: ${CLAMAV_IMAGE:?CLAMAV_IMAGE is required}
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAMD: "true"
    networks:
      - offline
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  schema-migration:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:?PYTHON_BASE_IMAGE is required}
        DCAGENT_UID: ${DCAGENT_UID:?DCAGENT_UID is required}
        DCAGENT_GID: ${DCAGENT_GID:?DCAGENT_GID is required}
    command: ["python", "-m", "app.migration_entrypoint"]
    restart: "no"
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - database_url
    networks:
      - offline

  embedding-service:
    build:
      context: ../..
      dockerfile: deploy/docker/embedding.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:?PYTHON_BASE_IMAGE is required}
        DCAGENT_UID: ${DCAGENT_UID:?DCAGENT_UID is required}
        DCAGENT_GID: ${DCAGENT_GID:?DCAGENT_GID is required}
    restart: unless-stopped
    environment:
      OFFLINE_MODE: "true"
      EMBEDDING_MODEL_ROOT: /models/${EMBEDDING_MODEL_DIR:?EMBEDDING_MODEL_DIR is required}
      EMBEDDING_MODEL_SHA256: ${EMBEDDING_MODEL_SHA256:?EMBEDDING_MODEL_SHA256 is required}
    volumes:
      - type: bind
        source: ${MODEL_ROOT:?MODEL_ROOT is required}
        target: /models
        read_only: true
        bind:
          create_host_path: false
    networks:
      - offline
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:?PYTHON_BASE_IMAGE is required}
        DCAGENT_UID: ${DCAGENT_UID:?DCAGENT_UID is required}
        DCAGENT_GID: ${DCAGENT_GID:?DCAGENT_GID is required}
    restart: unless-stopped
    environment:
      OFFLINE_MODE: "true"
      DATABASE_URL_FILE: /run/secrets/database_url
      STRUCTURED_QUERY_ENABLED: ${STRUCTURED_QUERY_ENABLED:?STRUCTURED_QUERY_ENABLED is required}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:?CLICKHOUSE_URL is required}
      CLICKHOUSE_QUERY_USER: ${CLICKHOUSE_QUERY_USER:?CLICKHOUSE_QUERY_USER is required}
      CLICKHOUSE_QUERY_PASSWORD_FILE: /run/secrets/clickhouse_query_password
      STRUCTURED_QUERY_TIMEOUT_SECONDS: ${STRUCTURED_QUERY_TIMEOUT_SECONDS:?STRUCTURED_QUERY_TIMEOUT_SECONDS is required}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      CLAMAV_HOST: clamav
      EMBEDDING_SERVICE_URL: http://embedding-service:8081
      LLAMA_SERVER_URL: http://llama:8080
      MODEL_SLOTS: ${MODEL_SLOTS:?MODEL_SLOTS is required}
      LLM_PROVIDER: ${LLM_PROVIDER:?LLM_PROVIDER is required}
      LLM_API_BASE: ${LLM_API_BASE:?LLM_API_BASE is required}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL is required}
      RAW_DATA_ROOT: /data/raw
      PARQUET_ROOT: /data/parquet
      MODEL_ROOT: /models
      DOCLING_ARTIFACTS_PATH: /models/docling
      PADDLEOCR_HOME: /models/paddleocr
      LIBREOFFICE_BIN: /usr/bin/libreoffice
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "true"
    secrets:
      - database_url
      - clickhouse_query_password
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/raw
        target: /data/raw
        bind:
          create_host_path: false
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/parquet
        target: /data/parquet
        bind:
          create_host_path: false
      - type: bind
        source: ${MODEL_ROOT:?MODEL_ROOT is required}
        target: /models
        read_only: true
        bind:
          create_host_path: false
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      schema-migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    networks:
      - offline

  ingestion-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/worker.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:?PYTHON_BASE_IMAGE is required}
        DCAGENT_UID: ${DCAGENT_UID:?DCAGENT_UID is required}
        DCAGENT_GID: ${DCAGENT_GID:?DCAGENT_GID is required}
    restart: unless-stopped
    command: ["python", "-m", "app.structured_worker"]
    environment:
      OFFLINE_MODE: "true"
      DATABASE_URL_FILE: /run/secrets/database_url
      STRUCTURED_QUERY_ENABLED: ${STRUCTURED_QUERY_ENABLED:?STRUCTURED_QUERY_ENABLED is required}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:?CLICKHOUSE_URL is required}
      CLICKHOUSE_INGEST_USER: ${CLICKHOUSE_INGEST_USER:?CLICKHOUSE_INGEST_USER is required}
      CLICKHOUSE_INGEST_PASSWORD_FILE: /run/secrets/clickhouse_ingest_password
      STRUCTURED_INGEST_BATCH_ROWS: ${STRUCTURED_INGEST_BATCH_ROWS:?STRUCTURED_INGEST_BATCH_ROWS is required}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      CLAMAV_HOST: clamav
      EMBEDDING_SERVICE_URL: http://embedding-service:8081
      RAW_DATA_ROOT: /data/raw
      PARQUET_ROOT: /data/parquet
      MODEL_ROOT: /models
      DOCLING_ARTIFACTS_PATH: /models/docling
      PADDLEOCR_HOME: /models/paddleocr
      LIBREOFFICE_BIN: /usr/bin/libreoffice
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "true"
    secrets:
      - database_url
      - clickhouse_ingest_password
    volumes:
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/raw
        target: /data/raw
        bind:
          create_host_path: false
      - type: bind
        source: ${DATA_ROOT:?DATA_ROOT is required}/parquet
        target: /data/parquet
        bind:
          create_host_path: false
      - type: bind
        source: ${MODEL_ROOT:?MODEL_ROOT is required}
        target: /models
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      schema-migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    networks:
      - offline
    profiles: ["indexing"]

  llama:
    image: ${LLAMA_IMAGE:?LLAMA_IMAGE is required}
    restart: unless-stopped
    command:
      ["--model", "/models/${LLAMA_MODEL_FILE:?LLAMA_MODEL_FILE is required}", "--host", "0.0.0.0", "--port", "8080", "--parallel", "${MODEL_SLOTS:?MODEL_SLOTS is required}"]
    volumes:
      - type: bind
        source: ${MODEL_ROOT:?MODEL_ROOT is required}
        target: /models
        read_only: true
        bind:
          create_host_path: false
    networks:
      - offline
    profiles: ["generation"]

networks:
  offline:
    internal: true

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?POSTGRES_PASSWORD_FILE is required}
  database_url:
    file: ${DATABASE_URL_SECRET_FILE:?DATABASE_URL_SECRET_FILE is required}
  clickhouse_query_password:
    file: ${CLICKHOUSE_QUERY_PASSWORD_FILE:?CLICKHOUSE_QUERY_PASSWORD_FILE is required}
  clickhouse_ingest_password:
    file: ${CLICKHOUSE_INGEST_PASSWORD_FILE:?CLICKHOUSE_INGEST_PASSWORD_FILE is required}
